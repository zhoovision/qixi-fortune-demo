<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1b0f12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>七夕 · 心有灵犀签</title>
    <link rel="preload" href="assets/live-room.png" as="image" />
    <link rel="preload" href="assets/fortune-bucket.png" as="image" />
    <link rel="stylesheet" href="styles.css?v=7" />
  </head>
  <body>
    <main class="phone gift-panel-open gift-not-sent" id="phone" aria-label="七夕直播间抽签互动演示">
      <img class="live-room" src="assets/live-room.png" alt="直播间画面" draggable="false" />
      <div class="scene-tint" aria-hidden="true"></div>

      <button class="gift-hotspot" id="giftHotspot" type="button" aria-label="打开礼物面板"></button>
      <div class="gift-scrim visible" id="giftScrim" aria-hidden="true"></div>

      <section class="gift-panel open" id="giftPanel" aria-label="礼物面板" aria-hidden="false">
        <button class="panel-handle" id="panelHandle" type="button" aria-label="收起礼物面板"><span></span></button>

        <header class="gift-header">
          <nav class="gift-tabs" aria-label="礼物分类">
            <button type="button">发现</button>
            <button type="button">七夕</button>
            <button class="active" type="button">常用</button>
            <button type="button">背包</button>
          </nav>
          <div class="gift-balance" aria-label="钻石余额200">
            <span class="diamond" aria-hidden="true"></span>
            <strong id="balanceValue">200</strong>
            <span class="chevron" aria-hidden="true">›</span>
          </div>
        </header>

        <div class="gift-subhead">
          <span>点击选择礼物，长按查看详情</span>
          <span class="panel-mode"><i aria-hidden="true"></i>常用</span>
        </div>

        <div class="gift-grid" id="giftGrid">
          <button class="gift-card selected" type="button" data-gift="fortune" data-name="心有灵犀签" data-price="9" aria-pressed="true">
            <span class="gift-visual fortune-thumb"><img src="assets/gift-fortune-thumb.png" alt="粉色抽签桶" /></span>
            <span class="gift-name">心有灵犀签</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>9</span>
          </button>

          <button class="gift-card" type="button" data-gift="placeholder" data-name="新岁醒狮" data-price="99" aria-pressed="false">
            <span class="gift-visual"><img src="assets/gift-newyear.png" alt="新岁醒狮礼物" /></span>
            <span class="gift-name">新岁醒狮</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>99</span>
          </button>

          <button class="gift-card" type="button" data-gift="placeholder" data-name="花马长卷" data-price="699" aria-pressed="false">
            <span class="gift-visual"><img src="assets/gift-scroll-horse.png" alt="花马长卷礼物" /></span>
            <span class="gift-name">花马长卷</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>699</span>
          </button>

          <button class="gift-card" type="button" data-gift="placeholder" data-name="玫瑰乐章" data-price="99" aria-pressed="false">
            <span class="gift-visual"><img src="assets/gift-rose-horse.png" alt="玫瑰乐章礼物" /></span>
            <span class="gift-name">玫瑰乐章</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>99</span>
          </button>

          <button class="gift-card" type="button" data-gift="placeholder" data-name="梦境白马" data-price="520" aria-pressed="false">
            <span class="gift-visual"><img src="assets/gift-dream-horse.png" alt="梦境白马礼物" /></span>
            <span class="gift-name">梦境白马</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>520</span>
          </button>

          <button class="gift-card" type="button" data-gift="placeholder" data-name="鎏金花束" data-price="699" aria-pressed="false">
            <span class="gift-visual"><img src="assets/gift-pink-bouquet.png" alt="鎏金花束礼物" /></span>
            <span class="gift-name">鎏金花束</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>699</span>
          </button>

          <button class="gift-card" type="button" data-gift="placeholder" data-name="福气小马" data-price="188" aria-pressed="false">
            <span class="gift-visual"><img src="assets/gift-lucky-horse.png" alt="福气小马礼物" /></span>
            <span class="gift-name">福气小马</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>188</span>
          </button>

          <button class="gift-card" type="button" data-gift="placeholder" data-name="一束心动" data-price="1888" aria-pressed="false">
            <span class="gift-visual"><img src="assets/gift-rose-girl.png" alt="一束心动礼物" /></span>
            <span class="gift-name">一束心动</span>
            <span class="gift-price"><i class="mini-diamond" aria-hidden="true"></i>1888</span>
          </button>
        </div>

        <footer class="gift-actions">
          <button class="quantity" type="button" aria-label="赠送数量1">1 <span>⌄</span></button>
          <button class="send-gift" id="sendGift" type="button">
            <span>送出</span>
            <small><i class="mini-diamond" aria-hidden="true"></i><b id="sendPrice">9</b></small>
          </button>
        </footer>
      </section>

      <div class="gift-toast" id="giftToast" role="status" aria-live="polite"></div>

      <section class="ritual" id="ritual" aria-live="polite">
        <div class="halo" aria-hidden="true"></div>
        <canvas class="bucket" id="bucket" role="button" aria-label="轻触开启手机摇一摇权限"></canvas>

        <div class="draw-stick" id="drawStick" aria-hidden="true">
          <span class="crystal"></span>
          <span class="stick-body"><i></i><i></i><i></i></span>
        </div>

        <div class="sparkles" id="sparkles" aria-hidden="true"></div>

        <div class="gesture-cue" id="gestureCue" aria-hidden="true">
          <span class="gesture-line"></span>
          <span class="gesture-arrow">↑</span>
        </div>

        <p class="hint" id="hint">摇一摇，请一支缘分签</p>
      </section>

      <section class="reveal" id="reveal" aria-hidden="true">
        <div class="sign-wrap">
          <div class="reveal-heading">
            <strong>恭喜获得</strong>
            <span>七夕专属灵签</span>
          </div>
          <article class="fortune-sign" id="fortuneSign" role="button" aria-label="点击签文再次抽签">
            <div class="sign-gem" aria-hidden="true"></div>
            <span class="sign-label">七夕灵签</span>
            <div class="vertical-copy">
              <h1 id="fortuneTitle">心有灵犀签</h1>
              <span class="sign-divider" aria-hidden="true"></span>
              <p id="fortuneText">所念之人，正携月色向你而来。</p>
            </div>
            <span class="sign-seal" aria-hidden="true">缘</span>
          </article>
          <button class="again" id="again" type="button">再抽一签</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=7"></script>
  </body>
</html>
